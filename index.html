<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pablo's Portal 2.0 — Hyper Neon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #050510;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow: hidden;
  color: #f5f7ff;
}

/* NAVBAR */

.navbar {
  height: 56px;
  background: rgba(10,10,25,0.9);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  box-shadow: 0 0 24px rgba(0,0,0,0.6);
}
.nav-title {
  font-size: 16px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  margin-right: auto;
  text-shadow: 0 0 12px cyan, 0 0 24px magenta;
}
.nav-btn {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(20,20,40,0.9);
  cursor: pointer;
  color: #f5f7ff;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.nav-btn.active {
  background: rgba(255,255,255,0.2);
}

/* VIEWS */

.view {
  position: absolute;
  inset: 56px 0 0 0;
  display: none;
}
.view.active {
  display: block;
}

/* MENU */

.menu-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(0,255,255,0.4), transparent 60%),
    radial-gradient(circle at 80% 100%, rgba(255,0,200,0.4), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(255,255,0,0.3), transparent 60%),
    #050510;
  animation: menuPulse 10s ease-in-out infinite alternate;
}
@keyframes menuPulse {
  0% { transform: scale(1); filter: blur(0px); opacity: 0.8; }
  100% { transform: scale(1.08); filter: blur(4px); opacity: 1; }
}
.menu-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.menu-title {
  padding: 16px 28px;
  border-radius: 24px;
  background: rgba(10,10,30,0.9);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 40px rgba(0,255,255,0.9),
    0 0 80px rgba(255,0,128,0.9);
  text-align: center;
}
.menu-title-main {
  font-size: 24px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 800;
}
.menu-title-sub {
  margin-top: 6px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.8;
}
.menu-btn {
  min-width: 220px;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(20,20,40,0.95);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 30px rgba(0,255,255,0.9),
    0 0 60px rgba(255,0,128,0.9);
}
.menu-btn:hover {
  background: rgba(30,30,60,0.98);
}

/* SANDBOX */

.sandbox-wrapper {
  display: flex;
  height: 100%;
}
.tools {
  width: 260px;
  background: rgba(10,10,30,0.9);
  border-right: 1px solid rgba(255,255,255,0.18);
  padding: 10px;
  overflow-y: auto;
}
.tool-section-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  opacity: 0.8;
  margin: 8px 0 4px;
}
.tool-btn {
  padding: 6px 10px;
  margin: 3px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(30,30,60,0.9);
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.tool-btn.active {
  background: rgba(255,255,255,0.2);
}
.sandbox-canvas-box {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top, rgba(0,255,255,0.2), transparent 60%),
    radial-gradient(circle at bottom, rgba(255,0,128,0.2), transparent 60%),
    #050510;
}
#sandboxCanvas {
  image-rendering: pixelated;
  background: black;
}

/* SNAKE */

.snake-center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  background:
    radial-gradient(circle at top, rgba(0,255,255,0.2), transparent 60%),
    radial-gradient(circle at bottom, rgba(255,0,128,0.2), transparent 60%),
    #050510;
}
#snakeCanvas {
  background: #050515;
  image-rendering: pixelated;
}
.snake-overlay {
  position: absolute;
  inset: 56px 0 0 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  font-size: 18px;
  text-shadow: 0 0 12px cyan;
}

/* CREDITS */

.credits-center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  font-size: 18px;
  text-shadow: 0 0 12px cyan;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-title">Pablo's Portal 2.0</div>
  <button class="nav-btn active" data-view="menu">Menu</button>
  <button class="nav-btn" data-view="sandbox">Sandbox</button>
  <button class="nav-btn" data-view="snake">Neon Snake</button>
  <button class="nav-btn" data-view="credits">Credits</button>
</div>

<!-- MENU VIEW -->
<div class="view active" id="view-menu">
  <div class="menu-bg"></div>
  <div class="menu-center">
    <div class="menu-title">
      <div class="menu-title-main">Pablo's Portal 2.0</div>
      <div class="menu-title-sub">Hyper‑Neon Physics Playground</div>
    </div>
    <button class="menu-btn" data-view="sandbox">Sandbox</button>
    <button class="menu-btn" data-view="snake">Neon Snake</button>
    <button class="menu-btn" data-view="credits">Credits</button>
  </div>
</div>

<!-- SANDBOX VIEW -->
<div class="view" id="view-sandbox">
  <div class="sandbox-wrapper">
    <div class="tools">
      <div class="tool-section-title">Materials</div>
      <button class="tool-btn" data-material="sand">Sand</button>
      <button class="tool-btn" data-material="water">Water</button>
      <button class="tool-btn" data-material="stone">Stone</button>
      <button class="tool-btn" data-material="fire">Fire</button>
      <button class="tool-btn" data-material="eraser">Eraser</button>

      <div class="tool-section-title">Brush Size</div>
      <button class="tool-btn" data-size="1">Tiny</button>
      <button class="tool-btn" data-size="2">Small</button>
      <button class="tool-btn" data-size="4">Medium</button>
      <button class="tool-btn" data-size="6">Large</button>

      <div class="tool-section-title">Ruler</div>
      <button class="tool-btn" id="rulerToggle">Ruler Mode</button>

      <div class="tool-section-title">World</div>
      <button class="tool-btn" id="clearWorld">Clear</button>
      <button class="tool-btn" id="randomWorld">Random</button>
      <button class="tool-btn" id="togglePause">Pause</button>
    </div>
    <div class="sandbox-canvas-box">
      <canvas id="sandboxCanvas"></canvas>
    </div>
  </div>
</div>

<!-- SNAKE VIEW -->
<div class="view" id="view-snake">
  <div class="snake-center">
    <canvas id="snakeCanvas"></canvas>
  </div>
  <div class="snake-overlay" id="snakeOverlay">Press SPACE to Start</div>
</div>

<!-- CREDITS VIEW -->
<div class="view" id="view-credits">
  <div class="credits-center">
    Designed by Rebecca — Hyper Neon Edition
  </div>
</div>

<script>
/* VIEW SWITCHING */

function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.view === name)
  );
}

document.querySelectorAll("[data-view]").forEach(btn => {
  btn.addEventListener("click", () => {
    showView(btn.dataset.view);
  });
});

/* SANDBOX ENGINE */

const sbCanvas = document.getElementById("sandboxCanvas");
const sbCtx = sbCanvas.getContext("2d");
let sbW = 220;
let sbH = 140;
sbCanvas.width = sbW;
sbCanvas.height = sbH;

const EMPTY=0,SAND=1,WATER=2,STONE=3,FIRE=4;
let grid = new Array(sbW*sbH).fill(0);
let fireLife = new Array(sbW*sbH).fill(0);

let currentMaterial=SAND;
let brush=3;
let paused=false;

let rulerMode = false;
let rulerStart = null;
let rulerEnd = null;
let isRulerDragging = false;

function idx(x,y){return y*sbW+x;}
function inBounds(x,y){return x>=0&&x<sbW&&y>=0&&y<sbH;}

function initGround(){
  for(let y=sbH-8;y<sbH;y++){
    for(let x=0;x<sbW;x++){
      grid[idx(x,y)]=STONE;
    }
  }
}
initGround();

function stepSandbox(){
  if(paused)return;
  for(let y=sbH-1;y>=0;y--){
    for(let x=0;x<sbW;x++){
      let i=idx(x,y),m=grid[i];
      if(m===SAND){
        let ny=y+1;
        if(ny<sbH){
          let below=idx(x,ny);
          if(grid[below]===EMPTY||grid[below]===WATER){
            [grid[i],grid[below]]=[grid[below],grid[i]];
          }else{
            let dir=Math.random()<0.5?-1:1;
            let nx=x+dir;
            if(inBounds(nx,ny)){
              let ni=idx(nx,ny);
              if(grid[ni]===EMPTY||grid[ni]===WATER){
                [grid[i],grid[ni]]=[grid[ni],grid[i]];
              }
            }
          }
        }
      }
      if(m===WATER){
        let ny=y+1;
        if(ny<sbH){
          let below=idx(x,ny);
          if(grid[below]===EMPTY){
            grid[below]=WATER;grid[i]=EMPTY;
          }else{
            let dir=Math.random()<0.5?-1:1;
            let nx=x+dir;
            if(inBounds(nx,y)&&grid[idx(nx,y)]===EMPTY){
              grid[idx(nx,y)]=WATER;grid[i]=EMPTY;
            }
          }
        }
      }
      if(m===FIRE){
        fireLife[i]--;
        if(fireLife[i]<=0){grid[i]=EMPTY;continue;}
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{
          let nx=x+dx,ny=y+dy;
          if(inBounds(nx,ny)){
            let ni=idx(nx,ny);
            if(grid[ni]===SAND||grid[ni]===WATER){
              if(Math.random()<0.08){
                grid[ni]=FIRE;
                fireLife[ni]=20+Math.random()*20;
              }
            }
          }
        });
      }
    }
  }
}

function materialColor(m){
  if(m===SAND)return [255,220,120];
  if(m===WATER)return [80,180,255];
  if(m===STONE)return [180,190,210];
  if(m===FIRE)return [255,120,40];
  return [0,0,0];
}

function renderSandbox(){
  let img=sbCtx.createImageData(sbW,sbH);
  for(let i=0;i<grid.length;i++){
    let m=grid[i];
    let p=i*4;
    let c=materialColor(m);
    img.data[p]=c[0];
    img.data[p+1]=c[1];
    img.data[p+2]=c[2];
    img.data[p+3]=255;
  }
  sbCtx.putImageData(img,0,0);
}

let drawing=false;

function canvasToGrid(e){
  let r=sbCanvas.getBoundingClientRect();
  let x=Math.floor((e.clientX-r.left)/r.width*sbW);
  let y=Math.floor((e.clientY-r.top)/r.height*sbH);
  return {x,y};
}

function paintCircle(cx,cy){
  for(let dy=-brush;dy<=brush;dy++){
    for(let dx=-brush;dx<=brush;dx++){
      let nx=cx+dx,ny=cy+dy;
      if(inBounds(nx,ny)&&dx*dx+dy*dy<=brush*brush){
        let i=idx(nx,ny);
        if(currentMaterial===FIRE){
          grid[i]=FIRE;fireLife[i]=30;
        }else{
          grid[i]=currentMaterial;
        }
      }
    }
  }
}

function drawRulerLine(start,end){
  let dx=end.x-start.x;
  let dy=end.y-start.y;
  let length=Math.sqrt(dx*dx+dy*dy);
  if(length===0)return;
  let steps=Math.ceil(length*2);
  for(let i=0;i<=steps;i++){
    let t=i/steps;
    let x=start.x+dx*t;
    let y=start.y+dy*t;
    paintCircle(Math.round(x),Math.round(y));
  }
}

sbCanvas.addEventListener("mousedown",e=>{
  const pos=canvasToGrid(e);
  if(rulerMode){
    isRulerDragging=true;
    rulerStart=pos;
    rulerEnd=pos;
  }else{
    drawing=true;
    paintCircle(pos.x,pos.y);
  }
});
window.addEventListener("mouseup",()=>{
  if(rulerMode && isRulerDragging && rulerStart && rulerEnd){
    drawRulerLine(rulerStart,rulerEnd);
  }
  drawing=false;
  isRulerDragging=false;
  rulerStart=null;
  rulerEnd=null;
});
sbCanvas.addEventListener("mousemove",e=>{
  const pos=canvasToGrid(e);
  if(rulerMode){
    if(isRulerDragging){
      rulerEnd=pos;
    }
  }else if(drawing){
    paintCircle(pos.x,pos.y);
  }
});

document.querySelectorAll("[data-material]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-material]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    let m=btn.dataset.material;
    if(m==="sand")currentMaterial=SAND;
    if(m==="water")currentMaterial=WATER;
    if(m==="stone")currentMaterial=STONE;
    if(m==="fire")currentMaterial=FIRE;
    if(m==="eraser")currentMaterial=EMPTY;
  });
});
document.querySelector('[data-material="sand"]').classList.add("active");

document.querySelectorAll("[data-size]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-size]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    brush=parseInt(btn.dataset.size);
  });
});
document.querySelector('[data-size="4"]').classList.add("active");

const rulerBtn=document.getElementById("rulerToggle");
rulerBtn.addEventListener("click",()=>{
  rulerMode=!rulerMode;
  rulerBtn.classList.toggle("active",rulerMode);
});

document.getElementById("clearWorld").onclick=()=>{grid.fill(0);fireLife.fill(0);initGround();};
document.getElementById("randomWorld").onclick=()=>{
  for(let i=0;i<grid.length;i++){
    let y=Math.floor(i/sbW);
    if(y>=sbH-8){grid[i]=STONE;continue;}
    let r=Math.random();
    if(r<0.05)grid[i]=STONE;
    else if(r<0.15)grid[i]=SAND;
    else if(r<0.22)grid[i]=WATER;
    else grid[i]=EMPTY;
  }
};
document.getElementById("togglePause").onclick=()=>{paused=!paused;};

/* SNAKE ENGINE */

const snCanvas=document.getElementById("snakeCanvas");
const snCtx=snCanvas.getContext("2d");
snCanvas.width=480;
snCanvas.height=320;

let cols=24,rows=16,size=20;
let snake=[],dir={x:1,y:0},nextDir={x:1,y:0};
let food={x:10,y:8};
let alive=false;
let overlay=document.getElementById("snakeOverlay");
let lastSnakeTime=0;
let snakeTickMs=140; // slowed down

function resetSnake(){
  snake=[{x:5,y:8},{x:4,y:8},{x:3,y:8}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  food=randomFood();
  alive=false;
  overlay.style.display="flex";
}
resetSnake();

function randomFood(){
  while(true){
    let x=Math.floor(Math.random()*cols);
    let y=Math.floor(Math.random()*rows);
    if(!snake.some(s=>s.x===x&&s.y===y))return{x,y};
  }
}

window.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    alive=true;
    overlay.style.display="none";
    return;
  }
  let nd={x:dir.x,y:dir.y};
  if(e.key==="ArrowUp"||e.key==="w"||e.key==="W")nd={x:0,y:-1};
  if(e.key==="ArrowDown"||e.key==="s"||e.key==="S")nd={x:0,y:1};
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A")nd={x:-1,y:0};
  if(e.key==="ArrowRight"||e.key==="d"||e.key==="D")nd={x:1,y:0};
  if(nd.x===-dir.x&&nd.y===-dir.y)return;
  nextDir=nd;
});

function stepSnake(timestamp){
  if(!lastSnakeTime)lastSnakeTime=timestamp;
  const delta=timestamp-lastSnakeTime;
  if(delta<snakeTickMs)return;
  lastSnakeTime=timestamp;
  if(!alive)return;

  dir={...nextDir};
  let head=snake[0];
  let nx=head.x+dir.x;
  let ny=head.y+dir.y;

  if(nx<0)nx=cols-1;
  else if(nx>=cols)nx=0;
  if(ny<0)ny=rows-1;
  else if(ny>=rows)ny=0;

  if(snake.some(s=>s.x===nx&&s.y===ny)){
    alive=false;
    overlay.style.display="flex";
    return;
  }

  snake.unshift({x:nx,y:ny});
  if(nx===food.x&&ny===food.y){
    food=randomFood();
  }else{
    snake.pop();
  }
}

function drawRoundedRect(ctx,x,y,w,h,r){
  const radius=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+radius,y);
  ctx.lineTo(x+w-radius,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+radius);
  ctx.lineTo(x+w,y+h-radius);
  ctx.quadraticCurveTo(x+w,y+h,x+w-radius,y+h);
  ctx.lineTo(x+radius,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-radius);
  ctx.lineTo(x,y+radius);
  ctx.quadraticCurveTo(x,y,x+radius,y);
  ctx.closePath();
}

function renderSnake(){
  snCtx.clearRect(0,0,snCanvas.width,snCanvas.height);
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const px=x*size,py=y*size;
      snCtx.fillStyle=(x+y)%2===0?"#050515":"#080820";
      snCtx.fillRect(px,py,size,size);
    }
  }
  const fx=food.x*size,fy=food.y*size;
  snCtx.fillStyle="#ffdd55";
  drawRoundedRect(snCtx,fx+3,fy+3,size-6,size-6,4);
  snCtx.fill();

  snake.forEach((seg,i)=>{
    const px=seg.x*size,py=seg.y*size;
    const isHead=i===0;
    const g=snCtx.createLinearGradient(px,py,px+size,py+size);
    if(isHead){
      g.addColorStop(0,"rgba(255,255,255,1)");
      g.addColorStop(1,"rgba(0,255,255,1)");
    }else{
      g.addColorStop(0,"rgba(0,255,255,0.9)");
      g.addColorStop(1,"rgba(255,0,200,0.9)");
    }
    snCtx.fillStyle=g;
    drawRoundedRect(snCtx,px+2,py+2,size-4,size-4,5);
    snCtx.fill();
  });
}

/* MAIN LOOP */

function loop(timestamp){
  stepSandbox();
  renderSandbox();
  stepSnake(timestamp);
  renderSnake();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
