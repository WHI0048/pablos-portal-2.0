<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pablo's Portal 2.0 — Hyper Neon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
html, body {
    height: 100%;
    background: radial-gradient(circle at 0% 0%, #00ffff 0, transparent 55%),
                radial-gradient(circle at 100% 100%, #ff00ff 0, transparent 55%),
                #050510;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    color: #f5f7ff;
}
body {
    animation: hueShift 18s linear infinite;
}
@keyframes hueShift {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

/* NAVBAR */
.navbar {
    height: 56px;
    background: rgba(5,5,20,0.9);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    box-shadow: 0 0 24px rgba(0,0,0,0.6);
}
.nav-title {
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    margin-right: auto;
    text-shadow: 0 0 12px cyan, 0 0 24px magenta;
}
.nav-btn {
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    background: radial-gradient(circle at 0 0, rgba(0,255,255,0.4), transparent 60%),
                rgba(20,20,40,0.9);
    cursor: pointer;
    color: #f5f7ff;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    display: flex;
    align-items: center;
}
.nav-btn.active {
    background: radial-gradient(circle at 100% 100%, rgba(255,0,255,0.4), transparent 60%),
                rgba(40,40,80,0.95);
}

/* VIEWS */
.view {
    position: absolute;
    inset: 56px 0 0 0;
    display: none;
}
.view.active {
    display: block;
}

/* MENU */
.menu-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 0%, rgba(0,255,255,0.5), transparent 60%),
                radial-gradient(circle at 80% 100%, rgba(255,0,200,0.5), transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(255,255,0,0.4), transparent 60%),
                #050510;
    animation: menuPulse 10s ease-in-out infinite alternate;
}
@keyframes menuPulse {
    0% { transform: scale(1); filter: blur(0px); opacity: 0.8; }
    100% { transform: scale(1.08); filter: blur(4px); opacity: 1; }
}
.menu-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
}
.menu-title {
    padding: 16px 28px;
    border-radius: 24px;
    background: rgba(10,10,30,0.9);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06),
                0 0 40px rgba(0,255,255,0.9),
                0 0 80px rgba(255,0,128,0.9),
                0 0 140px rgba(0,255,255,1);
    text-align: center;
}
.menu-title-main {
    font-size: 24px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 800;
}
.menu-title-sub {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.8;
}
.menu-btn {
    min-width: 220px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(20,20,40,0.95);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06),
                0 0 30px rgba(0,255,255,0.9),
                0 0 60px rgba(255,0,128,0.9),
                0 0 120px rgba(0,255,255,1);
}
.menu-btn:hover {
    background: rgba(30,30,60,0.98);
}

/* EDITOR LAYOUT */
.editor-root {
    position: absolute;
    inset: 0;
    display: flex;
}

/* Left cyber-glass panel */
.editor-panel {
    width: 260px;
    background: rgba(5,10,30,0.92);
    backdrop-filter: blur(18px);
    border-right: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 0 40px rgba(0,255,255,0.4);
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 10px;
}
.editor-panel-title {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.9;
    margin-bottom: 4px;
}
.editor-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
}
.editor-tab {
    flex: 1;
    padding: 6px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(15,20,40,0.9);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
}
.editor-tab.active {
    background: radial-gradient(circle at 100% 0, rgba(0,255,255,0.5), transparent 60%),
                rgba(40,50,90,0.98);
}
.editor-section {
    flex: 1;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.16);
    background: radial-gradient(circle at 0 0, rgba(0,255,255,0.18), transparent 60%),
                rgba(10,10,30,0.9);
    padding: 10px;
    overflow: auto;
    font-size: 11px;
}
.editor-section.hidden {
    display: none;
}
.editor-palette-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
}
.editor-palette-item {
    padding: 8px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(20,25,50,0.95);
    cursor: pointer;
    text-align: center;
    font-size: 11px;
}
.editor-palette-item.active {
    box-shadow: 0 0 18px rgba(0,255,255,0.9);
    border-color: rgba(0,255,255,0.9);
}
.editor-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 6px;
}
.editor-row label {
    font-size: 11px;
    opacity: 0.85;
}
.editor-row input[type="number"],
.editor-row input[type="range"] {
    flex: 1;
}
.editor-btn {
    width: 100%;
    margin-top: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(20,20,40,0.95);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
}
.editor-btn:hover {
    background: rgba(30,30,60,0.98);
}

/* Editor canvas area */
.editor-canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
}
#editorCanvas {
    width: 100%;
    height: 100%;
    display: block;
    background: radial-gradient(circle at 0% 0%, rgba(0,255,255,0.15), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(255,0,255,0.15), transparent 55%),
                #050510;
}

/* CREDITS */
.credits-center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    font-size: 18px;
    text-shadow: 0 0 12px cyan, 0 0 24px magenta;
}

/* SNAKE (simple neon snake placeholder) */
#snakeCanvas {
    width: 100%;
    height: 100%;
    display: block;
    background: radial-gradient(circle at 0% 0%, rgba(0,255,255,0.15), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(255,0,255,0.15), transparent 55%),
                #050510;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-title">Pablo's Portal 2.0</div>

    <!-- Link to 1.0 -->
    <a href="https://whi0048.github.io/pablos-portal/" class="nav-btn">1.0</a>

    <button class="nav-btn active" data-view="menu">Menu</button>
    <button class="nav-btn" data-view="editor">Pablo‑Dash Editor</button>
    <button class="nav-btn" data-view="snake">Neon Snake</button>
    <button class="nav-btn" data-view="credits">Credits</button>
</div>

<!-- MENU VIEW -->
<div class="view active" id="view-menu">
    <div class="menu-bg"></div>
    <div class="menu-center">
        <div class="menu-title">
            <div class="menu-title-main">Pablo's Portal 2.0</div>
            <div class="menu-title-sub">Hyper‑Neon Physics Playground</div>
        </div>
        <button class="menu-btn" data-view="editor">Pablo‑Dash Editor</button>
        <button class="menu-btn" data-view="snake">Neon Snake</button>
        <button class="menu-btn" data-view="credits">Credits</button>
    </div>
</div>

<!-- EDITOR VIEW (replaces sandbox) -->
<div class="view" id="view-editor">
    <div class="editor-root">
        <div class="editor-panel">
            <div class="editor-panel-title">Pablo‑Dash Editor</div>

            <div class="editor-tabs">
                <div class="editor-tab active" data-tab="objects">Objects</div>
                <div class="editor-tab" data-tab="tools">Tools</div>
                <div class="editor-tab" data-tab="settings">Settings</div>
            </div>

            <div class="editor-section" id="tab-objects">
                <div class="editor-palette-grid">
                    <div class="editor-palette-item active" data-object-type="block">Block</div>
                    <div class="editor-palette-item" data-object-type="spike">Spike</div>
                    <div class="editor-palette-item" data-object-type="pad">Jump Pad</div>
                    <div class="editor-palette-item" data-object-type="decor">Decor</div>
                </div>
                <button class="editor-btn" id="btnPlaytest">Playtest</button>
                <button class="editor-btn" id="btnStopPlaytest">Stop</button>
            </div>

            <div class="editor-section hidden" id="tab-tools">
                <div class="editor-palette-grid">
                    <div class="editor-palette-item" data-tool="place">Place</div>
                    <div class="editor-palette-item" data-tool="delete">Delete</div>
                    <div class="editor-palette-item" data-tool="spawn">Spawn Line</div>
                    <div class="editor-palette-item" data-tool="pan">Pan</div>
                </div>
                <button class="editor-btn" id="btnClearLevel">Clear Level</button>
            </div>

            <div class="editor-section hidden" id="tab-settings">
                <div class="editor-row">
                    <label>Grid Size</label>
                    <input type="number" id="gridSizeInput" value="40" min="10" max="200" />
                </div>
                <div class="editor-row">
                    <label>Scroll Speed</label>
                    <input type="range" id="scrollSpeedInput" min="5" max="40" value="18" />
                </div>
                <div class="editor-row">
                    <label>Gravity</label>
                    <input type="range" id="gravityInput" min="0.2" max="2.0" step="0.1" value="1.0" />
                </div>
                <button class="editor-btn" id="btnExport">Export JSON</button>
                <button class="editor-btn" id="btnImport">Import JSON</button>
            </div>
        </div>

        <div class="editor-canvas-wrap">
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>
</div>

<!-- SNAKE VIEW (simple neon snake) -->
<div class="view" id="view-snake">
    <canvas id="snakeCanvas"></canvas>
</div>

<!-- CREDITS VIEW -->
<div class="view" id="view-credits">
    <div class="credits-center">Designed by Rebecca — Hyper Neon Edition</div>
</div>

<script>
/* VIEW SWITCHING */
const navButtons = document.querySelectorAll('.nav-btn[data-view]');
const views = document.querySelectorAll('.view');
const menuButtons = document.querySelectorAll('.menu-btn[data-view]');

function showView(id) {
    views.forEach(v => v.classList.toggle('active', v.id === 'view-' + id));
    navButtons.forEach(b => b.classList.toggle('active', b.dataset.view === id));
}

navButtons.forEach(btn => {
    btn.addEventListener('click', () => showView(btn.dataset.view));
});
menuButtons.forEach(btn => {
    btn.addEventListener('click', () => showView(btn.dataset.view));
});

/* EDITOR TABS */
const editorTabs = document.querySelectorAll('.editor-tab');
const editorSections = {
    objects: document.getElementById('tab-objects'),
    tools: document.getElementById('tab-tools'),
    settings: document.getElementById('tab-settings')
};
editorTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        editorTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        Object.keys(editorSections).forEach(k => {
            editorSections[k].classList.toggle('hidden', k !== tab.dataset.tab);
        });
    });
});

/* EDITOR STATE */
const editorCanvas = document.getElementById('editorCanvas');
const ectx = editorCanvas.getContext('2d');

let editorWidth = 0;
let editorHeight = 0;

function resizeEditorCanvas() {
    const rect = editorCanvas.getBoundingClientRect();
    editorCanvas.width = rect.width;
    editorCanvas.height = rect.height;
    editorWidth = rect.width;
    editorHeight = rect.height;
}
window.addEventListener('resize', resizeEditorCanvas);
resizeEditorCanvas();

/* Level data */
let gridSize = 40;
let scrollSpeed = 18;
let gravity = 1.0;

const gridSizeInput = document.getElementById('gridSizeInput');
const scrollSpeedInput = document.getElementById('scrollSpeedInput');
const gravityInput = document.getElementById('gravityInput');

gridSizeInput.addEventListener('change', () => {
    gridSize = Math.max(10, Math.min(200, parseInt(gridSizeInput.value) || 40));
});
scrollSpeedInput.addEventListener('input', () => {
    scrollSpeed = parseInt(scrollSpeedInput.value) || 18;
});
gravityInput.addEventListener('input', () => {
    gravity = parseFloat(gravityInput.value) || 1.0;
});

let objects = []; // {type, x, y, w, h}
let spawnLineX = 100;
let killBarrierX = -40;

let cameraX = 0;
let cameraY = 0;
let zoom = 1;

let currentObjectType = 'block';
let currentTool = 'place';

const paletteItems = document.querySelectorAll('.editor-palette-item[data-object-type]');
paletteItems.forEach(item => {
    item.addEventListener('click', () => {
        paletteItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentObjectType = item.dataset.objectType;
        currentTool = 'place';
    });
});

const toolItems = document.querySelectorAll('.editor-palette-item[data-tool]');
toolItems.forEach(item => {
    item.addEventListener('click', () => {
        toolItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentTool = item.dataset.tool;
    });
});

/* Mouse handling */
let isMouseDown = false;
let lastMouseX = 0;
let lastMouseY = 0;

editorCanvas.addEventListener('mousedown', e => {
    const rect = editorCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    isMouseDown = true;
    lastMouseX = mx;
    lastMouseY = my;

    const world = screenToWorld(mx, my);

    if (currentTool === 'place') {
        placeObject(world.x, world.y);
    } else if (currentTool === 'delete') {
        deleteObject(world.x, world.y);
    } else if (currentTool === 'spawn') {
        spawnLineX = snap(world.x);
    }
});

editorCanvas.addEventListener('mousemove', e => {
    if (!isMouseDown) return;
    const rect = editorCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (currentTool === 'pan') {
        const dx = (mx - lastMouseX) / zoom;
        const dy = (my - lastMouseY) / zoom;
        cameraX -= dx;
        cameraY -= dy;
    }

    lastMouseX = mx;
    lastMouseY = my;
});

editorCanvas.addEventListener('mouseup', () => {
    isMouseDown = false;
});
editorCanvas.addEventListener('mouseleave', () => {
    isMouseDown = false;
});

editorCanvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = -Math.sign(e.deltaY) * 0.1;
    zoom = Math.max(0.4, Math.min(2.5, zoom + delta));
}, { passive: false });

function snap(v) {
    return Math.round(v / gridSize) * gridSize;
}

function screenToWorld(sx, sy) {
    const wx = (sx / zoom) + cameraX;
    const wy = (sy / zoom) + cameraY;
    return { x: wx, y: wy };
}

function placeObject(wx, wy) {
    const x = snap(wx);
    const y = snap(wy);
    const size = gridSize;

    if (currentObjectType === 'block') {
        objects.push({ type: 'block', x, y, w: size, h: size });
    } else if (currentObjectType === 'spike') {
        objects.push({ type: 'spike', x, y, w: size, h: size });
    } else if (currentObjectType === 'pad') {
        objects.push({ type: 'pad', x, y, w: size, h: size / 2 });
    } else if (currentObjectType === 'decor') {
        objects.push({ type: 'decor', x, y, w: size, h: size });
    }
}

function deleteObject(wx, wy) {
    for (let i = objects.length - 1; i >= 0; i--) {
        const o = objects[i];
        if (wx >= o.x && wx <= o.x + o.w && wy >= o.y && wy <= o.y + o.h) {
            objects.splice(i, 1);
            return;
        }
    }
}

/* Playtest */
let playtest = false;
let cube = null;

const btnPlaytest = document.getElementById('btnPlaytest');
const btnStopPlaytest = document.getElementById('btnStopPlaytest');
const btnClearLevel = document.getElementById('btnClearLevel');
const btnExport = document.getElementById('btnExport');
const btnImport = document.getElementById('btnImport');

btnPlaytest.addEventListener('click', () => {
    startPlaytest();
});
btnStopPlaytest.addEventListener('click', () => {
    stopPlaytest();
});
btnClearLevel.addEventListener('click', () => {
    objects = [];
});
btnExport.addEventListener('click', () => {
    const data = {
        objects,
        spawnLineX,
        killBarrierX,
        gridSize,
        scrollSpeed,
        gravity
    };
    const json = JSON.stringify(data);
    window.prompt('Level JSON:', json);
});
btnImport.addEventListener('click', () => {
    const json = window.prompt('Paste level JSON:');
    if (!json) return;
    try {
        const data = JSON.parse(json);
        objects = data.objects || [];
        spawnLineX = data.spawnLineX ?? spawnLineX;
        killBarrierX = data.killBarrierX ?? killBarrierX;
        gridSize = data.gridSize || gridSize;
        scrollSpeed = data.scrollSpeed || scrollSpeed;
        gravity = data.gravity || gravity;
        gridSizeInput.value = gridSize;
        scrollSpeedInput.value = scrollSpeed;
        gravityInput.value = gravity;
    } catch (e) {
        alert('Invalid JSON');
    }
});

function startPlaytest() {
    playtest = true;
    cube = {
        x: spawnLineX + 10,
        y: 0,
        w: gridSize * 0.6,
        h: gridSize * 0.6,
        vx: scrollSpeed,
        vy: 0,
        onGround: false
    };
}

function stopPlaytest() {
    playtest = false;
    cube = null;
}

/* Keyboard for jump */
let jumpPressed = false;
window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        jumpPressed = true;
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'Space') {
        jumpPressed = false;
    }
});

/* Physics helpers */
function rectIntersect(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

/* EDITOR RENDER LOOP */
function renderEditor(dt) {
    ectx.setTransform(1, 0, 0, 1, 0, 0);
    ectx.clearRect(0, 0, editorWidth, editorHeight);

    ectx.save();
    ectx.scale(zoom, zoom);
    ectx.translate(-cameraX, -cameraY);

    // Blue neon grid
    ectx.strokeStyle = 'rgba(0,255,255,0.25)';
    ectx.lineWidth = 1;
    const startX = Math.floor((cameraX) / gridSize) * gridSize - gridSize * 2;
    const endX = (cameraX + editorWidth / zoom) + gridSize * 2;
    const startY = Math.floor((cameraY) / gridSize) * gridSize - gridSize * 2;
    const endY = (cameraY + editorHeight / zoom) + gridSize * 2;

    ectx.beginPath();
    for (let x = startX; x < endX; x += gridSize) {
        ectx.moveTo(x, startY);
        ectx.lineTo(x, endY);
    }
    for (let y = startY; y < endY; y += gridSize) {
        ectx.moveTo(startX, y);
        ectx.lineTo(endX, y);
    }
    ectx.stroke();

    // Spawn line
    ectx.strokeStyle = 'rgba(0,255,255,0.9)';
    ectx.lineWidth = 2;
    ectx.beginPath();
    ectx.moveTo(spawnLineX, startY);
    ectx.lineTo(spawnLineX, endY);
    ectx.stroke();

    // Kill barrier
    ectx.strokeStyle = 'rgba(255,0,0,0.9)';
    ectx.lineWidth = 3;
    ectx.beginPath();
    ectx.moveTo(killBarrierX, startY);
    ectx.lineTo(killBarrierX, endY);
    ectx.stroke();

    // Objects
    for (const o of objects) {
        if (o.type === 'block') {
            ectx.fillStyle = 'rgba(0,255,255,0.6)';
            ectx.strokeStyle = 'rgba(255,255,255,0.8)';
            ectx.lineWidth = 1.5;
            ectx.fillRect(o.x, o.y, o.w, o.h);
            ectx.strokeRect(o.x, o.y, o.w, o.h);
        } else if (o.type === 'spike') {
            ectx.fillStyle = 'rgba(255,0,128,0.8)';
            ectx.beginPath();
            ectx.moveTo(o.x, o.y + o.h);
            ectx.lineTo(o.x + o.w / 2, o.y);
            ectx.lineTo(o.x + o.w, o.y + o.h);
            ectx.closePath();
            ectx.fill();
        } else if (o.type === 'pad') {
            ectx.fillStyle = 'rgba(0,255,0,0.8)';
            ectx.fillRect(o.x, o.y + o.h / 2, o.w, o.h / 2);
        } else if (o.type === 'decor') {
            ectx.strokeStyle = 'rgba(255,255,255,0.4)';
            ectx.strokeRect(o.x, o.y, o.w, o.h);
        }
    }

    // Playtest cube
    if (playtest && cube) {
        // Physics
        cube.vy += gravity;
        cube.x += cube.vx * (dt / 16.67);
        cube.y += cube.vy * (dt / 16.67);
        cube.onGround = false;

        const cubeRect = { x: cube.x, y: cube.y, w: cube.w, h: cube.h };

        // Kill barrier
        if (cube.x + cube.w < killBarrierX) {
            cube.x = spawnLineX + 10;
            cube.y = 0;
            cube.vx = scrollSpeed;
            cube.vy = 0;
        }

        // Collisions
        for (const o of objects) {
            const oRect = { x: o.x, y: o.y, w: o.w, h: o.h };
            if (o.type === 'block') {
                if (rectIntersect(cubeRect, oRect)) {
                    // Simple resolution: place cube on top if falling
                    if (cube.vy > 0 && cube.y + cube.h <= o.y + cube.vy + 2) {
                        cube.y = o.y - cube.h;
                        cube.vy = 0;
                        cube.onGround = true;
                        cubeRect.y = cube.y;
                    } else {
                        // Horizontal collision: stop
                        cube.x = o.x - cube.w;
                        cube.vx = scrollSpeed;
                        cubeRect.x = cube.x;
                    }
                }
            } else if (o.type === 'spike') {
                if (rectIntersect(cubeRect, oRect)) {
                    // Death
                    cube.x = spawnLineX + 10;
                    cube.y = 0;
                    cube.vx = scrollSpeed;
                    cube.vy = 0;
                    cubeRect.x = cube.x;
                    cubeRect.y = cube.y;
                }
            } else if (o.type === 'pad') {
                if (rectIntersect(cubeRect, oRect)) {
                    cube.vy = -18;
                }
            }
        }

        // Jump
        if (jumpPressed && cube.onGround) {
            cube.vy = -16;
            cube.onGround = false;
        }

        // Camera follow
        cameraX = cube.x - editorWidth / (2 * zoom);

        // Draw cube
        ectx.fillStyle = 'rgba(255,255,255,0.95)';
        ectx.fillRect(cube.x, cube.y, cube.w, cube.h);
        ectx.strokeStyle = 'rgba(0,255,255,1)';
        ectx.lineWidth = 2;
        ectx.strokeRect(cube.x, cube.y, cube.w, cube.h);
    }

    ectx.restore();
}

/* SNAKE GAME (simple) */
const snakeCanvas = document.getElementById('snakeCanvas');
const sctx = snakeCanvas.getContext('2d');
let snakeWidth = 0;
let snakeHeight = 0;

function resizeSnakeCanvas() {
    const rect = snakeCanvas.getBoundingClientRect();
    snakeCanvas.width = rect.width;
    snakeCanvas.height = rect.height;
    snakeWidth = rect.width;
    snakeHeight = rect.height;
}
window.addEventListener('resize', resizeSnakeCanvas);
resizeSnakeCanvas();

let snake = [{ x: 10, y: 10 }];
let snakeDir = { x: 1, y: 0 };
let food = { x: 15, y: 10 };
let snakeCellSize = 20;
let snakeTimer = 0;

window.addEventListener('keydown', e => {
    if (e.code === 'ArrowUp' && snakeDir.y === 0) snakeDir = { x: 0, y: -1 };
    if (e.code === 'ArrowDown' && snakeDir.y === 0) snakeDir = { x: 0, y: 1 };
    if (e.code === 'ArrowLeft' && snakeDir.x === 0) snakeDir = { x: -1, y: 0 };
    if (e.code === 'ArrowRight' && snakeDir.x === 0) snakeDir = { x: 1, y: 0 };
});

function updateSnake(dt) {
    snakeTimer += dt;
    if (snakeTimer < 120) return;
    snakeTimer = 0;

    const head = { x: snake[0].x + snakeDir.x, y: snake[0].y + snakeDir.y };
    if (head.x < 0) head.x = Math.floor(snakeWidth / snakeCellSize) - 1;
    if (head.y < 0) head.y = Math.floor(snakeHeight / snakeCellSize) - 1;
    if (head.x >= Math.floor(snakeWidth / snakeCellSize)) head.x = 0;
    if (head.y >= Math.floor(snakeHeight / snakeCellSize)) head.y = 0;

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        food.x = Math.floor(Math.random() * (snakeWidth / snakeCellSize));
        food.y = Math.floor(Math.random() * (snakeHeight / snakeCellSize));
    } else {
        snake.pop();
    }
}

function renderSnake() {
    sctx.setTransform(1, 0, 0, 1, 0, 0);
    sctx.clearRect(0, 0, snakeWidth, snakeHeight);

    // Background glow
    sctx.fillStyle = '#050510';
    sctx.fillRect(0, 0, snakeWidth, snakeHeight);

    // Food
    sctx.fillStyle = 'rgba(255,0,255,0.9)';
    sctx.shadowColor = 'rgba(255,0,255,0.9)';
    sctx.shadowBlur = 12;
    sctx.fillRect(food.x * snakeCellSize, food.y * snakeCellSize, snakeCellSize, snakeCellSize);

    // Snake
    sctx.fillStyle = 'rgba(0,255,255,0.9)';
    sctx.shadowColor = 'rgba(0,255,255,0.9)';
    sctx.shadowBlur = 12;
    for (const seg of snake) {
        sctx.fillRect(seg.x * snakeCellSize, seg.y * snakeCellSize, snakeCellSize, snakeCellSize);
    }
}

/* MAIN LOOP */
let lastTime = performance.now();
function loop(now) {
    const dt = now - lastTime;
    lastTime = now;

    renderEditor(dt);
    updateSnake(dt);
    renderSnake();

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
