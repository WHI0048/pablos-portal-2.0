<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pablo's Portal 2.0 — Hyper Neon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: radial-gradient(circle at 0% 0%, #00ffff 0, transparent 55%), radial-gradient(circle at 100% 100%, #ff00ff 0, transparent 55%), #050510; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; color: #f5f7ff; }
body { animation: hueShift 18s linear infinite; }
@keyframes hueShift { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

/* NAVBAR */
.navbar { height: 56px; background: rgba(5,5,20,0.9); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(255,255,255,0.18); display: flex; align-items: center; padding: 0 16px; gap: 8px; box-shadow: 0 0 24px rgba(0,0,0,0.6); }
.nav-title { font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; margin-right: auto; text-shadow: 0 0 12px cyan, 0 0 24px magenta; }
.nav-btn { padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.3); background: radial-gradient(circle at 0 0, rgba(0,255,255,0.4), transparent 60%), rgba(20,20,40,0.9); cursor: pointer; color: #f5f7ff; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
.nav-btn.active { background: radial-gradient(circle at 100% 100%, rgba(255,0,255,0.4), transparent 60%), rgba(40,40,80,0.95); }

/* VIEWS */
.view { position: absolute; inset: 56px 0 0 0; display: none; }
.view.active { display: block; }

/* MENU */
.menu-bg { position: absolute; inset: 0; background: radial-gradient(circle at 20% 0%, rgba(0,255,255,0.5), transparent 60%), radial-gradient(circle at 80% 100%, rgba(255,0,200,0.5), transparent 60%), radial-gradient(circle at 50% 50%, rgba(255,255,0,0.4), transparent 60%), #050510; animation: menuPulse 10s ease-in-out infinite alternate; }
@keyframes menuPulse { 0% { transform: scale(1); filter: blur(0px); opacity: 0.8; } 100% { transform: scale(1.08); filter: blur(4px); opacity: 1; } }
.menu-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
.menu-title { padding: 16px 28px; border-radius: 24px; background: rgba(10,10,30,0.9); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 40px rgba(0,255,255,0.9), 0 0 80px rgba(255,0,128,0.9), 0 0 140px rgba(0,255,255,1); text-align: center; }
.menu-title-main { font-size: 24px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800; }
.menu-title-sub { margin-top: 6px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.8; }
.menu-btn { min-width: 220px; padding: 10px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.3); background: rgba(20,20,40,0.95); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 0 30px rgba(0,255,255,0.9), 0 0 60px rgba(255,0,128,0.9), 0 0 120px rgba(0,255,255,1); }
.menu-btn:hover { background: rgba(30,30,60,0.98); }

/* SANDBOX */
.sandbox-wrapper { display: flex; height: 100%; }
.tools { width: 290px; background: rgba(5,5,20,0.9); backdrop-filter: blur(18px); border-right: 1px solid rgba(255,255,255,0.18); padding: 10px; overflow-y: auto; }
.tool-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em; opacity: 0.8; margin: 8px 0 4px; }
.tool-btn { padding: 6px 10px; margin: 3px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.3); background: rgba(30,30,60,0.9); cursor: pointer; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
.tool-btn.active { background: rgba(255,255,255,0.25); }
.slider-row { display: flex; align-items: center; gap: 8px; margin: 4px 0 10px; }
.slider-row span { font-size: 11px; opacity: 0.8; }
#brushSlider { width: 100%; }
.sandbox-canvas-box { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
.sandbox-frame { position: relative; padding: 12px; border-radius: 22px; background: radial-gradient(circle at 0% 0%, rgba(0,255,255,0.25), transparent 60%), radial-gradient(circle at 100% 100%, rgba(255,0,255,0.25), transparent 60%), rgba(5,5,20,0.9); box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 0 40px rgba(0,255,255,1), 0 0 80px rgba(255,0,128,1), 0 0 140px rgba(0,255,255,1); overflow: hidden; }
.sandbox-frame::before { content: ""; position: absolute; inset: -40%; background: conic-gradient(from 0deg, rgba(0,255,255,0.7), rgba(255,0,255,0.7), rgba(255,255,0,0.7), rgba(0,255,255,0.7)); opacity: 0.5; mix-blend-mode: screen; animation: frameSpin 10s linear infinite; pointer-events: none; z-index: -1; }
@keyframes frameSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#sandboxCanvas { image-rendering: pixelated; background: black; width: 95vw; height: 80vh; display: block; position: relative; z-index: 10; }

/* SNAKE */
.snake-center { display: flex; justify-content: center; align-items: center; height: 100%; }
.snake-frame { position: relative; padding: 12px; border-radius: 22px; background: radial-gradient(circle at 0% 0%, rgba(0,255,255,0.25), transparent 60%), radial-gradient(circle at 100% 100%, rgba(255,0,255,0.25), transparent 60%), rgba(5,5,20,0.9); box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 0 40px rgba(0,255,255,1), 0 0 80px rgba(255,0,128,1), 0 0 140px rgba(0,255,255,1); overflow: hidden; }
.snake-frame::before { content: ""; position: absolute; inset: -40%; background: conic-gradient(from 0deg, rgba(0,255,255,0.7), rgba(255,0,255,0.7), rgba(255,255,0,0.7), rgba(0,255,255,0.7)); opacity: 0.5; mix-blend-mode: screen; animation: frameSpin 10s linear infinite; pointer-events: none; z-index: -1; }
#snakeCanvas { background: #050515; image-rendering: pixelated; width: 95vw; height: 80vh; display: block; position: relative; z-index: 10; }
.snake-overlay { position: absolute; inset: 56px 0 0 0; display: flex; justify-content: center; align-items: center; pointer-events: none; font-size: 18px; text-shadow: 0 0 12px cyan, 0 0 24px magenta; z-index: 5; }

/* CREDITS */
.credits-center { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 18px; text-shadow: 0 0 12px cyan, 0 0 24px magenta; }
</style>
</head>

if (target) showView(target);
});
});
